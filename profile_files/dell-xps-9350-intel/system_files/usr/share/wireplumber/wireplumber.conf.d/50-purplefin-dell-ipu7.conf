# The IPU7 ISYS exposes 32 raw V4L2 capture nodes. They are implementation
# details for libcamera, not independent webcams, so do not publish them to
# Firefox/WebRTC. The libcamera monitor remains enabled and exposes the sensor.
monitor.v4l2.rules = [
  {
    matches = [
      {
        device.api = "v4l2"
        device.description = "ipu7"
      }
    ]
    actions = {
      update-props = {
        device.disabled = true
      }
    }
  }
]
