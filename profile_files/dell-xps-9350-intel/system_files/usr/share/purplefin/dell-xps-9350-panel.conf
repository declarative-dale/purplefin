# Dell XPS 13 9350 internal-panel policy defaults.
#
# To opt out or change either selector, copy this file to
# ~/.config/purplefin/dell-xps-9350-panel.conf. Mode values are exact names
# reported by `gdctl show --modes`.

PANEL_POLICY_ENABLED=true
PANEL_CONNECTOR=eDP-1
PANEL_AC_MODE=1920x1200@120.000+vrr
PANEL_BATTERY_MODE=1920x1200@60.000
RECONCILE_INTERVAL=15

# On the first eligible graphical start, enable GNOME ambient brightness and
# write a v1 marker under XDG_STATE_HOME. Later user choices are never changed.
AMBIENT_BRIGHTNESS_MIGRATION_ENABLED=true
