# Vendor defaults for the Dell XPS 13 9350 battery policy.
# Override these values in /etc/purplefin/dell-xps-9350-battery.conf.
# Supported keys are ENABLED, START_THRESHOLD, and END_THRESHOLD. Values are
# unquoted. Set ENABLED=false in the local file to leave firmware policy alone.
ENABLED=true
START_THRESHOLD=75
END_THRESHOLD=80
