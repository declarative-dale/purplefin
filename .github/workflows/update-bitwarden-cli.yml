name: Update Bitwarden CLI

on:
  schedule:
    - cron: "23 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-bitwarden-cli
  cancel-in-progress: false

jobs:
  update:
    name: Check upstream release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update pinned release metadata
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          build_files/update-bitwarden-cli.sh
          if git diff --quiet -- build_files/bitwarden-cli.env; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            source build_files/bitwarden-cli.env
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "version=${BITWARDEN_CLI_VERSION}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate update
        if: steps.update.outputs.changed == 'true'
        run: just check

      - name: Open update pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.update.outputs.version }}
        run: |
          branch="automation/update-bitwarden-cli"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "${branch}"
          git add build_files/bitwarden-cli.env
          git commit -m "Update Bitwarden CLI to ${VERSION}"
          git push --force origin "HEAD:refs/heads/${branch}"

          pr_number="$(gh pr list --head "${branch}" --state open --json number --jq '.[0].number // empty')"
          if [[ -z "${pr_number}" ]]; then
            gh pr create \
              --base main \
              --head "${branch}" \
              --title "Update Bitwarden CLI to ${VERSION}" \
              --body "Updates the pinned official Bitwarden CLI archive and its GitHub-published SHA-256 digest."
          else
            gh pr edit "${pr_number}" \
              --title "Update Bitwarden CLI to ${VERSION}" \
              --body "Updates the pinned official Bitwarden CLI archive and its GitHub-published SHA-256 digest."
          fi
