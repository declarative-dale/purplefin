name: Build Purplefin

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: base-generic
            tags: generic-x86_64 latest base-generic-x86_64
          - profile: base-dell-xps-9350-intel
            tags: base-dell-xps-9350-intel
          - profile: sales-generic
            tags: sales-generic
          - profile: sales-dell-xps-9350-intel
            tags: sales-dell-xps-9350-intel
          - profile: support-generic
            tags: support-generic
          - profile: support-dell-xps-9350-intel
            tags: support-dell-xps-9350-intel
          - profile: dale
            tags: dale dell-xps-9350-intel
          - profile: dale-cosmic
            tags: dale-cosmic

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve boot kernel metadata
        id: kernel
        shell: bash
        run: |
          base_kernel="$(skopeo inspect --retry-times 3 docker://ghcr.io/projectbluefin/bluefin:stable | jq -er '.Labels["ostree.linux"]')"
          target_kernel="$(build_files/select-ostree-linux.sh '${{ matrix.profile }}' "${base_kernel}")"
          echo "release=${target_kernel}" >> "${GITHUB_OUTPUT}"

      - name: Build image
        env:
          TAGS: ${{ matrix.tags }}
          BUILD_PROFILE: ${{ matrix.profile }}
          PURPLEFIN_OSTREE_LINUX: ${{ steps.kernel.outputs.release }}
        shell: bash
        run: |
          read -r -a tags <<< "${TAGS}"
          primary_image="${IMAGE_NAME}:${tags[0]}"

          buildah bud \
            --file ./Containerfile \
            --label "ostree.linux=${PURPLEFIN_OSTREE_LINUX}" \
            --build-arg "BUILD_PROFILE=${BUILD_PROFILE}" \
            --build-arg BASE_IMAGE=ghcr.io/projectbluefin/bluefin \
            --build-arg BASE_TAG=stable \
            --build-arg "PURPLEFIN_OSTREE_LINUX=${PURPLEFIN_OSTREE_LINUX}" \
            --format docker \
            --tls-verify=true \
            --tag "${primary_image}" \
            .

          for tag in "${tags[@]:1}"; do
            buildah tag "${primary_image}" "${IMAGE_NAME}:${tag}"
          done

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          install -d -m 0700 "${HOME}/.docker"
          registry_auth_file="${HOME}/.docker/config.json"
          printf '%s' "${GHCR_TOKEN}" |
            podman login \
              --authfile "${registry_auth_file}" \
              "${REGISTRY}" \
              --username "${GITHUB_ACTOR}" \
              --password-stdin
          echo "REGISTRY_AUTH_FILE=${registry_auth_file}" >> "${GITHUB_ENV}"

      - name: Push image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ matrix.tags }}
        shell: bash
        run: |
          read -r -a tags <<< "${TAGS}"
          for tag in "${tags[@]}"; do
            podman push --quiet \
              "${IMAGE_NAME}:${tag}" \
              "${REGISTRY}/${IMAGE_NAME}:${tag}" \
              --tls-verify=true
          done

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image tags
        if: github.event_name != 'pull_request'
        run: |
          for tag in ${{ matrix.tags }}; do
            cosign sign --yes "${REGISTRY}/${IMAGE_NAME}:${tag}"
          done

      - name: Log out of GHCR
        if: ${{ always() && github.event_name != 'pull_request' }}
        continue-on-error: true
        run: |
          registry_auth_file="${REGISTRY_AUTH_FILE:-${HOME}/.docker/config.json}"
          podman logout --authfile "${registry_auth_file}" "${REGISTRY}" || true
          rm -f "${registry_auth_file}"

  cosmic-smoke:
    name: Boot and log in to COSMIC
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install VM runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes openssh-client ovmf qemu-system-x86

      - name: Boot image and verify COSMIC login
        env:
          COSMIC_SMOKE_IMAGE: ghcr.io/${{ github.repository }}:dale-cosmic
        run: sudo tests/cosmic-vm-smoke.sh "${COSMIC_SMOKE_IMAGE}"
