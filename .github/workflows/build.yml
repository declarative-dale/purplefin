name: Build Purplefin

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.department }} / ${{ matrix.hardware }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - department: base
            hardware: generic-x86_64
            tags: generic-x86_64 latest base-generic-x86_64
          - department: support
            hardware: dell-xps-9350-intel
            tags: dell-xps-9350-intel support-dell-xps-9350-intel
          - department: support
            hardware: lenovo-generic
            tags: support-lenovo-generic
          - department: development
            hardware: desktop-x86_64
            tags: development-desktop-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve boot kernel metadata
        id: kernel
        shell: bash
        run: |
          base_kernel="$(skopeo inspect --retry-times 3 docker://ghcr.io/ublue-os/bluefin:stable | jq -er '.Labels["ostree.linux"]')"
          target_kernel="$(build_files/select-ostree-linux.sh '${{ matrix.hardware }}' "${base_kernel}")"
          echo "release=${target_kernel}" >> "${GITHUB_OUTPUT}"

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ matrix.tags }}
          containerfiles: ./Containerfile
          build-args: |
            BUILD_ROLE=${{ matrix.department }}
            BUILD_PROFILE=${{ matrix.hardware }}
            BASE_IMAGE=ghcr.io/ublue-os/bluefin
            BASE_TAG=stable
            PURPLEFIN_OSTREE_LINUX=${{ steps.kernel.outputs.release }}
          labels: |
            ostree.linux=${{ steps.kernel.outputs.release }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.REGISTRY }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image tags
        if: github.event_name != 'pull_request'
        run: |
          for tag in ${{ matrix.tags }}; do
            cosign sign --yes "${REGISTRY}/${IMAGE_NAME}:${tag}"
          done
