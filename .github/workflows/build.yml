name: Build Purplefin

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.department }} / ${{ matrix.hardware }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - department: base
            hardware: generic-x86_64
            tags: generic-x86_64 latest base-generic-x86_64
          - department: support
            hardware: dell-xps-9350-intel
            tags: dell-xps-9350-intel support-dell-xps-9350-intel
          - department: support
            hardware: lenovo-generic
            tags: support-lenovo-generic
          - department: development
            hardware: desktop-x86_64
            tags: development-desktop-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve boot kernel metadata
        id: kernel
        shell: bash
        run: |
          base_kernel="$(skopeo inspect --retry-times 3 docker://ghcr.io/ublue-os/bluefin:stable | jq -er '.Labels["ostree.linux"]')"
          target_kernel="$(build_files/select-ostree-linux.sh '${{ matrix.hardware }}' "${base_kernel}")"
          echo "release=${target_kernel}" >> "${GITHUB_OUTPUT}"

      - name: Build image
        env:
          TAGS: ${{ matrix.tags }}
          BUILD_ROLE: ${{ matrix.department }}
          BUILD_PROFILE: ${{ matrix.hardware }}
          PURPLEFIN_OSTREE_LINUX: ${{ steps.kernel.outputs.release }}
        shell: bash
        run: |
          read -r -a tags <<< "${TAGS}"
          primary_image="${IMAGE_NAME}:${tags[0]}"

          buildah bud \
            --file ./Containerfile \
            --label "ostree.linux=${PURPLEFIN_OSTREE_LINUX}" \
            --build-arg "BUILD_ROLE=${BUILD_ROLE}" \
            --build-arg "BUILD_PROFILE=${BUILD_PROFILE}" \
            --build-arg BASE_IMAGE=ghcr.io/ublue-os/bluefin \
            --build-arg BASE_TAG=stable \
            --build-arg "PURPLEFIN_OSTREE_LINUX=${PURPLEFIN_OSTREE_LINUX}" \
            --format docker \
            --tls-verify=true \
            --tag "${primary_image}" \
            .

          for tag in "${tags[@]:1}"; do
            buildah tag "${primary_image}" "${IMAGE_NAME}:${tag}"
          done

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          printf '%s' "${GHCR_TOKEN}" |
            podman login "${REGISTRY}" --username "${GITHUB_ACTOR}" --password-stdin

      - name: Push image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ matrix.tags }}
        shell: bash
        run: |
          read -r -a tags <<< "${TAGS}"
          for tag in "${tags[@]}"; do
            podman push --quiet \
              "${IMAGE_NAME}:${tag}" \
              "${REGISTRY}/${IMAGE_NAME}:${tag}" \
              --tls-verify=true
          done

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image tags
        if: github.event_name != 'pull_request'
        run: |
          for tag in ${{ matrix.tags }}; do
            cosign sign --yes "${REGISTRY}/${IMAGE_NAME}:${tag}"
          done

      - name: Log out of GHCR
        if: ${{ always() && github.event_name != 'pull_request' }}
        continue-on-error: true
        run: podman logout "${REGISTRY}"
